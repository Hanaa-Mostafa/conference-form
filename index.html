<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة - المؤتمر العلمي الدولي السابع</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========================================= -->
<!-- صفحة اللوجن -->
<!-- ========================================= -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-header">
      <div class="icon"><i class="fas fa-shield-alt"></i></div>
      <h2>لوحة إدارة المؤتمر</h2>
      <p>المؤتمر العلمي الدولي السابع</p>
    </div>
    <div class="mb-3">
      <label style="font-weight:600; color:#1f2a3a; font-size:0.9rem; margin-bottom:6px; display:block;">
        <i class="fas fa-user" style="color:#c9a84c;"></i> اسم المستخدم
      </label>
      <input type="text" id="loginUser" class="form-control" placeholder="أدخل اسم المستخدم" autocomplete="off">
    </div>
    <div class="mb-3">
      <label style="font-weight:600; color:#1f2a3a; font-size:0.9rem; margin-bottom:6px; display:block;">
        <i class="fas fa-lock" style="color:#c9a84c;"></i> كلمة المرور
      </label>
      <input type="password" id="loginPass" class="form-control" placeholder="أدخل كلمة المرور" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i> دخول
    </button>
    <div id="loginError">
      <i class="fas fa-exclamation-circle"></i> اسم المستخدم أو كلمة المرور غير صحيحة
    </div>
  </div>
</div>

<!-- ========================================= -->
<!-- لوحة الإدارة -->
<!-- ========================================= -->
<div id="adminPage">

  <!-- Navbar -->
  <div class="top-navbar">
    <div class="brand">
      <i class="fas fa-university"></i> لوحة إدارة المؤتمر
    </div>
    <div class="nav-actions">
      <button class="btn-refresh" onclick="loadData()">
        <i class="fas fa-sync-alt"></i> تحديث
      </button>
      <button class="btn-logout" onclick="doLogout()">
        <i class="fas fa-sign-out-alt"></i> خروج
      </button>
    </div>
  </div>

  <div class="admin-content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-info">
          <div class="number" id="statTotal">-</div>
          <div class="label">إجمالي المسجلين</div>
        </div>
      </div>
      <div class="stat-card gold">
        <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
        <div class="stat-info">
          <div class="number" id="statResearch">-</div>
          <div class="label">أوراق بحثية</div>
        </div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
        <div class="stat-info">
          <div class="number" id="statPhysical">-</div>
          <div class="label">حضور فعلي</div>
        </div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon"><i class="fas fa-wifi"></i></div>
        <div class="stat-info">
          <div class="number" id="statOnline">-</div>
          <div class="label">أون لاين</div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="table-toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 ابحث بالاسم أو الإيميل أو الجهة..." oninput="filterTable()">
      <select class="filter-select" id="filterType" onchange="filterTable()">
        <option value="">كل أنواع المشاركة</option>
        <option value="ورقة بحثية">ورقة بحثية</option>
        <option value="مستمع">مستمع</option>
      </select>
      <select class="filter-select" id="filterAttend" onchange="filterTable()">
        <option value="">كل طبيعة الحضور</option>
        <option value="حضور فعلي">حضور فعلي</option>
        <option value="أون لاين">أون لاين</option>
      </select>
      <button class="btn-export" onclick="exportCSV()">
        <i class="fas fa-file-csv"></i> تصدير CSV
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <div id="tableContent">
        <div class="loading-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p>جارٍ تحميل البيانات...</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
